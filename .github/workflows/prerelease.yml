name: Prerelease

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    if: ${{ contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add $TARGET

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ env.TARGET }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ env.TARGET }}-

      - name: Inject tag version into Cargo.toml
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME -replace '^v', ''
          $text = Get-Content -Raw Cargo.toml
          $text = [regex]::Replace($text, '(?m)^version = ".*"', "version = `"$tag`"", 1)
          Set-Content -NoNewline -Path Cargo.toml -Value $text

      - name: Build
        run: cargo build --release --target $TARGET

      - name: Package binaries
        run: |
          for bin in lore lore-server; do
            src="target/${TARGET}/release/${bin}"
            tar -czf "${bin}-${TARGET}.tar.gz" -C "$(dirname "$src")" "$(basename "$src")"
            sha256sum "${bin}-${TARGET}.tar.gz" > "${bin}-${TARGET}.tar.gz.sha256"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ env.TARGET }}
          path: |
            *.tar.gz
            *.tar.gz.sha256

  release:
    if: ${{ contains(github.ref_name, '-') }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create prerelease
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          files: artifacts/*
